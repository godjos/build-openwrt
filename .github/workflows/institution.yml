#
# 在[build]文件夹里面创建文件夹程序,请勿修改文件名称（institution.yml）
#
# 创建文件夹需要用到REPO_TOKEN密匙
#
# REPO_TOKEN密匙制作教程：https://git.io/jm.md
#

name: 创建文件夹
on:
  workflow_dispatch:
    inputs:
      establish_sample:
        description: '请选择创建文件夹的源码'
        required: false
        default: 'Lede'
        type: choice
        options:
          - 'Lede'
          - 'Immortalwrt'
          - 'Lienol'
          - 'Official'
          - 'Xwrt'
          - 'Mt798x'
      establish_name:
        description: '输入您需要创建的文件夹名称'
        required: true
        default: ''
env:
  REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
  GIT_REPOSITORY: ${{github.repository}}
  TONGBU_CANGKU: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  TZ: Asia/Shanghai

jobs:
  build:
    name: 在[build]文件夹里面创建文件夹
    runs-on: ubuntu-22.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}
    
    steps:
    - name: 准备结束
      uses: actions/checkout@v5
      
    - name: 密匙检测
      run: |
        bash scripts/ci/ops.sh check-token
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        
    - name: 创建文件夹
      if: env.REPO_TOKEN
      run: |
        cd $GITHUB_WORKSPACE
        bash "${GITHUB_WORKSPACE}/scripts/ci/ops.sh" create-workflow-folder "${{ inputs.establish_sample }}" "${{ inputs.establish_name }}"
        git add "build/${{ inputs.establish_name }}" ".github/workflows/${{ inputs.establish_name }}.yml"
        git commit -m "Update $(date +%Y-%m%d-%H%M%S)"
        git push --quiet "https://${{ secrets.REPO_TOKEN }}@github.com/${{github.repository}}" HEAD:main
        if [[ $? -ne 0 ]]; then
          echo "${{ inputs.establish_name }}文件夹创建失败"
        else
          echo "${{ inputs.establish_name }}文件夹创建完成"
        fi
